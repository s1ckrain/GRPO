# NFT LoRA — FLUX.1-Kontext (image edit) with Rational Rewards (`rational_rewards_edit`).
# Requires: pip install openai; dataset with conditioning (e.g. dataset/sharegpt4o_image_mini).
# Start vLLM judge: scripts/start_vllm_rational_reward.sh — set api_base_url / vlm_model.
launcher: "accelerate"
config_file: config/accelerate_configs/multi_gpu.yaml
num_processes: 8
main_process_port: 29500
mixed_precision: "bf16"

data:
  dataset_dir: "dataset/sharegpt4o_image_mini"
  enable_preprocess: false
  preprocessing_batch_size: 8
  dataloader_num_workers: 16
  force_reprocess: false
  cache_dir: "~/.cache/flow_factory/datasets"
  max_dataset_size: 10000
  sampler_type: "auto"

model:
  finetune_type: "lora"
  lora_rank: 64
  lora_alpha: 128
  target_modules: "default"
  model_name_or_path: "black-forest-labs/FLUX.1-Kontext-dev"
  model_type: "flux1-kontext"
  resume_path: null
  resume_type: null

log:
  run_name: null
  project: "Flow-Factory"
  logging_backend: "wandb"
  save_dir: "saves/"
  save_freq: 10
  save_model_only: true

train:
  trainer_type: "nft"
  advantage_aggregation: "gdpo"
  nft_beta: 1.0
  off_policy: true
  ema_decay_schedule: "piecewise_linear"
  flat_steps: 0
  ramp_rate: 0.001
  ema_decay: 0.5
  ema_update_interval: 1
  ema_device: "cuda"
  num_train_timesteps: null
  time_sampling_strategy: "discrete"
  time_shift: 3.0
  timestep_range: 0.9
  kl_type: "v-based"
  kl_beta: 1.0e-3
  ref_param_device: "cuda"
  clip_range: 1.0e-4
  adv_clip_range: 5.0
  resolution: 512
  auto_resize: true
  condition_image_size: [512, 512]
  num_inference_steps: 20
  guidance_scale: 2.5
  per_device_batch_size: 1
  group_size: 16
  global_std: false
  unique_sample_num_per_epoch: 32
  gradient_step_per_epoch: 1
  learning_rate: 2.0e-4
  adam_weight_decay: 1.0e-4
  adam_betas: [0.9, 0.999]
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  enable_gradient_checkpointing: false
  seed: 42

scheduler:
  dynamics_type: "ODE"

eval:
  resolution: 512
  auto_resize: true
  condition_image_size: [512, 512]
  per_device_batch_size: 1
  guidance_scale: 2.5
  num_inference_steps: 28
  eval_freq: 10
  seed: 42

rewards:
  - name: "rational_rewards_edit"
    reward_model: "rational_rewards_edit"
    batch_size: 8
    device: "cuda"
    dtype: bfloat16
    api_base_url: "http://127.0.0.1:8000/v1"
    api_key: "EMPTY"
    vlm_model: "RationalRewards-8B-Edit"
    max_concurrent: 8
    max_retries: 3
    timeout: 300
    temperature: 0.1
    max_tokens: 2048
    aspects:
      - text_faithfulness
      - image_faithfulness
      - physical_quality
      - text_rendering
