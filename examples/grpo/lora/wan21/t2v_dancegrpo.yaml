# Wan2.1-T2V-1.3B × DanceGRPO baseline × VideoAlign reward (LoRA).
#
# Target metrics (TaRoS Table 4, DanceGRPO+VideoAlign+3-dim, Wan1.3B):
#   VQ 3.448 → 3.412 | MQ 0.2911 → 0.3022 | TA -1.914 → -1.172
#
# Quick reference (commonly tweaked knobs):
#   train.num_frames    49     # min 41 to keep VideoAlign motion signal > v1 floor
#   train.group_size    16     # aligned with TaRoS G=16 (was 8 before sparse-SDE compensation)
#   train.num_inference_steps  16   # train w/ fewer steps (eval uses 50); save 20% sampling time
#   train.learning_rate 1e-5   # ×2 vs TaRoS to compensate sparse-SDE (we train 6/16 vs DGP 12/20)
#   scheduler.num_sde_steps  6  # 6/16 SDE transitions trained per rollout (DanceGRPO uses 12/20=60%)
#   max_epochs          110    # 110 epoch × 2 opt.step = 220 step (TaRoS §5.2)
#   eval.max_dataset_size  64  # bump to 128/1000 for final paper-style eval
#
# Budget (4×H200, ~3 days):
#   per-epoch: sampling 15min + reward 3min + training 20min = ~38min
#   110 epoch + 10 eval × 11min = ~72h ≈ 3 days

# Environment Configuration
launcher: "accelerate"
config_file: config/deepspeed/deepspeed_zero2.yaml
num_processes: 4  # [DIFF] 4 GPUs
main_process_port: 29500
mixed_precision: "bf16"  # Options: no, fp16, bf16

# Data Configuration
data:
  dataset_dir: "dataset/vid_prompt"  # [DIFF] DanceGRPO 50k video prompts
  preprocessing_batch_size: 8
  dataloader_num_workers: 16
  force_reprocess: true
  cache_dir: "~/.cache/flow_factory/datasets"
  max_dataset_size: 1000  # train split cap; test split uses eval.max_dataset_size
  sampler_type: "auto"  # Options: auto, distributed_k_repeat, group_contiguous

# Model Configuration
model:
  finetune_type: 'lora'  # Options: full, lora
  lora_rank: 64
  lora_alpha: 128
  target_components: 'transformer'
  target_modules: "default"
  model_name_or_path: "/aigc/posttrain/siyuanfu/models/Wan2.1"  # [DIFF] local weights
  model_type: "wan2_t2v"  # Options: wan2_t2v, wan2_i2v, wan2_v2v
  resume_path: null
  resume_type: null  # Options: lora, full, state, null (auto)

log:
  run_name: null
  project: "Flow-Factory"
  logging_backend: "wandb"  # Options: wandb, swanlab, tensorboard, none
  save_dir: "saves/"
  save_freq: 11  # aligned with eval_freq → every evaluated step has a ckpt
  save_model_only: true

# Training Configuration
train:
  trainer_type: 'grpo'  # Options: 'grpo', 'nft', 'awm'
  advantage_aggregation: 'sum'  # [P0-FIX] gdpo→sum: gdpo 的全局 batch-norm 会把 advantage 强行 z-score 到 1,
                                # 与 DanceGRPO 单 composite reward 的 group-relative 不一致;sum + global_std=false
                                # 严格等价 DanceGRPO/fastvideo/train_grpo_wan_2_1.py 的 per-group normalize

  clip_range: 2.0e-4  # [P1-FIX] 1e-4→2e-4: 配合 lr×2,否则 ratio 立刻撞 clip 边界饱和;
                      # 实测之前 clip_frac_total 已经到 0.9+,说明 1e-4 太紧
  adv_clip_range: 5.0

  kl_type: 'v-based'  # Options: 'x-based', 'v-based'
  kl_beta: 0  # ~1e-2 for x-based, ~1e-3 for v-based, 0 disables
  ref_param_device: 'cuda'  # Options: cpu, cuda

  # Sampling
  resolution: [480, 832]
  num_frames: 49  # must satisfy (num_frames - 1) % 4 == 0
  num_inference_steps: 16  # [P1-FIX] 20→16: 节省 20% sampling 时间(占总时长 78%),给 num_sde_steps↑留 buffer
  guidance_scale: 5.0

  # Batch
  per_device_batch_size: 1
  group_size: 16  # [P1-FIX] 8→16: 严格对齐 TaRoS G=16;group_std 估计方差减半,advantage 信号更干净
  global_std: false
  unique_sample_num_per_epoch: 16  # [P1-FIX] 32→16: 配合 group_size×2,保持 total samples=256/epoch 不变
                                   # (16 prompt × 16 group = 256 samples,与原 32×8=256 同总量)
  gradient_step_per_epoch: 2  # MUST be >= 2 (else ratio≡1, PPO clipping inactive)
  gradient_accumulation_steps: auto

  # Optimization
  learning_rate: 1.0e-5  # [P1-FIX] 5e-6→1e-5: 配合稀疏 SDE 训练(1/16 step)的累积不足,
                         # 实测之前 28 epoch grad_norm 仅 ~5e-4,LoRA 累计移动 ~1e-7 几乎等于不学;
                         # ×2 补偿后单步移动量翻倍,clip_range 同步放大才不会立刻饱和
  adam_weight_decay: 1.0e-4
  adam_betas: [0.9, 0.999]
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0

  # EMA
  ema_decay: 0.95  # [P1-FIX] 0.99→0.95: 0.99 在 110 epoch 训练里 half-life 太长(>100 epoch),
                   # eval 始终反映 pretrained 权重;0.95 半衰期 28 epoch,训练末期 EMA 反映 ~94% 训练权重
  ema_update_interval: 2
  ema_device: "cuda"  # Options: cpu, cuda

  # Memory
  enable_gradient_checkpointing: true  # REQUIRED at 480×832×49; backward OOMs without it
  offload_samples_to_cpu: true  # required for video models (per-sample tensors are GB-scale)

  seed: 42
  max_epochs: 110  # 220 optimizer steps (TaRoS §5.2)

# Scheduler Configuration
scheduler:
  dynamics_type: "Dance-SDE"  # [DIFF] DanceGRPO noise schedule
  noise_level: 0.3  # [P0-FIX] 0.9→0.3: 严格对齐 DanceGRPO `finetune_wan_2_1_grpo.sh --eta 0.3`;
                    # 0.9 让 SDE 噪声主导 group 方差,policy 信号被淹没,且 sample 质量整体偏低
  num_sde_steps: 6  # [P1-FIX] 1→6: 每 epoch 训 6 个 SDE transition,DanceGRPO 用 12/20(60%);
                    # 我们 6/16(37.5%)是 3 天预算下能稳进的最大值,training 时长 ×6 但 sampling 不变,
                    # 总 epoch 时长 24min→40min,110 epoch ≈ 74h 约 3.1 天
  sde_steps: [1, 2, 3, 4, 5, 6]  # 跳过索引 0(σ=1.0 数值不稳),覆盖 denoising 前 37.5% 高噪声区段;
                                 # num_sde_steps==len(sde_steps) 时所有 6 步每 epoch 都被训练(确定性)
  seed: 42
  flow_shift: 3.0  # 5.0 for 720P, 3.0 for 480P

# Evaluation
eval:
  resolution: [480, 832]
  num_frames: 49  # keep in sync with train.num_frames
  per_device_batch_size: 1
  seed: 42
  guidance_scale: 5.0
  num_inference_steps: 50
  eval_freq: 11  # 10 evals over 110 epoch
  max_dataset_size: 64  # [P1-FIX] 128→64: 每次 eval 从 22min→11min,10 次 eval 总省 ~2h;
                        # 论文级评测前再 bump 到 128 或 1000

# Reward Model Configuration  [DIFF] VideoAlign (1:1:1) instead of CLIP+PickScore
rewards:
  - name: "videoalign"
    reward_model: "videoalign"
    weight: 1.0
    batch_size: 1
    device: "cuda"
    dtype: bfloat16
    videoalign_dir: "/aigc/posttrain/siyuanfu/VideoAlign"
    checkpoint_dir: null  # default = {videoalign_dir}/checkpoints
    vq_coef: 1.0
    mq_coef: 1.0
    ta_coef: 1.0
    use_norm: true  # z-score on (match DanceGRPO)
    video_fps: 15
    return_metrics: true

# Optional Evaluation Reward Models
# eval_rewards:
#   - name: "text_alignment_2"
#     reward_model: "CLIP"
#     batch_size: 16
#     device: "cuda"
#     dtype: bfloat16
